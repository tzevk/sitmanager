<svg xmlns="http://www.w3.org/2000/svg" width="600" height="760" viewBox="0 0 600 760" role="img" aria-labelledby="title desc">
  <title id="title">Direct UPI Transfer QR Placeholder</title>
  <desc id="desc">Place the institute UPI QR image file at public/direct-upi-transfer-qr.svg or replace with PNG/JPG using the same name.</desc>
  <rect x="0" y="0" width="600" height="760" fill="#ffffff"/>
  <rect x="70" y="40" width="460" height="460" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <g fill="#334155" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="300" y="220" font-size="28" font-weight="700">DIRECT UPI TRANSFER</text>
    <text x="300" y="265" font-size="18">Replace this placeholder with the provided QR image</text>
    <text x="300" y="292" font-size="18">at the same path.</text>
  </g>
  <g fill="#0f172a" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="300" y="575" font-size="36" font-weight="800">SUVIDYA INSTITUTE OF TECH</text>
    <text x="200" y="630" font-size="40" font-weight="800">037326012440007</text>
    <text x="440" y="630" font-size="40" font-weight="800">54972698</text>
  </g>
</svg>
